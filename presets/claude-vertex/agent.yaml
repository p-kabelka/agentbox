# Agent preset — copied to .agentbox/sessions/<name>/config/agent.yaml on 'agentbox init --name <name>'.

agent_image: localhost/agentbox-agent-claude:latest

# OCI annotations applied to the agent container.
# Useful for setting krun resource limits (memory, CPUs).
# annotations:
#   krun.ram_mib: "2048"
#   krun.cpus: "2"

# Extra environment variables injected into the agent container.
# These are merged with (and can override) the base env in compose-base.yaml.
environment:
  IS_SANDBOX: 1 # required to allow --dangerously-skip-permissions
  AGENT_HARNESS: claude
  AGENT_HARNESS_ARGS: --dangerously-skip-permissions
  CLAUDE_CODE_USE_VERTEX: 1
  ANTHROPIC_VERTEX_PROJECT_ID: itpc-gcp-pnd-pe-eng-claude
  CLOUD_ML_REGION: global

# Dotfiles placed in the agent's $HOME at session start.
# Keys are paths relative to home (e.g. .bashrc, .gitconfig, .config/git/config).
dotfiles:
  .bashrc: |
    # .bashrc

    # Source global definitions
    if [ -f /etc/bashrc ]; then
        . /etc/bashrc
    fi

    # User specific environment
    if ! [[ "$PATH" =~ "$HOME/.local/bin:$HOME/bin:" ]]; then
        PATH="$HOME/.local/bin:$HOME/bin:$PATH"
    fi
    export PATH

    # Uncomment the following line if you don't like systemctl's auto-paging feature:
    # export SYSTEMD_PAGER=

    # User specific aliases and functions
    if [ -d ~/.bashrc.d ]; then
        for rc in ~/.bashrc.d/*; do
            if [ -f "$rc" ]; then
                . "$rc"
            fi
        done
    fi
    unset rc

    # CUSTOM
    export EDITOR=vim
    alias agent="$AGENT_HARNESS $AGENT_HARNESS_ARGS"
    alias ll="ls -lasp"
    alias g="git"

    _claude_ws="$(pwd)"
    if ! jq -e --arg workspace "$_claude_ws" '.hasCompletedOnboarding == true and .projects[$workspace].hasTrustDialogAccepted == true' "$HOME/.claude.json" &>/dev/null; then
      _claude_json="$HOME/.claude.json"
      if [ -f "$_claude_json" ]; then
        jq --arg workspace "$_claude_ws" '.hasCompletedOnboarding = true | .projects = {($workspace): {hasTrustDialogAccepted: true}}' "$_claude_json" > "${_claude_json}.tmp" && cp -f "${_claude_json}.tmp" "$_claude_json" && rm -f "${_claude_json}.tmp"
      else
        jq -n --arg workspace "$_claude_ws" '{hasCompletedOnboarding: true, projects: {($workspace): {hasTrustDialogAccepted: true}}}' > "$_claude_json"
      fi
    fi

    if ! jq -e '.skipDangerousModePermissionPrompt == true and .env.DISABLE_TELEMETRY == "1" and .env.ANTHROPIC_DEFAULT_SONNET_MODEL == "claude-sonnet-4-6"' "$HOME/.claude/settings.json" &>/dev/null; then
      _settings_json="$HOME/.claude/settings.json"
      mkdir -p "$HOME/.claude" 2>/dev/null || true
      if [ -f "$_settings_json" ]; then
        jq '. * {skipDangerousModePermissionPrompt: true, env: {DISABLE_TELEMETRY: "1", ANTHROPIC_DEFAULT_SONNET_MODEL: "claude-sonnet-4-6"}, "model": "opusplan", "theme": "dark-ansi"}' "$_settings_json" > "${_settings_json}.tmp" && cp -f "${_settings_json}.tmp" "$_settings_json" && rm -f "${_settings_json}.tmp"
      else
        echo '{"skipDangerousModePermissionPrompt": true, "env": {"DISABLE_TELEMETRY": "1", "ANTHROPIC_DEFAULT_SONNET_MODEL": "claude-sonnet-4-6"}, "model": "opusplan", "theme": "dark-ansi"}' > "$_settings_json"
      fi
    fi
  .gitconfig: |
    [user]
        name = Agent
        email = agent@agentbox

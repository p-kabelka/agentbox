# Default provider preset. Copied to .agentbox/sessions/<name>/config/proxy.yaml on 'agentbox run --name <name>'.

providers:
  - name: vertex
    enabled: true
    credential_type: oauth
    metadata_server: true
    inject_header: Authorization
    inject_prefix: "Bearer "
    replace_token: "dummy-replaced-by-proxy"
    request_policy:
      - host: "(.*-)?aiplatform\\.googleapis\\.com"
        paths:
          - "/v1/projects/${VERTEX_PROJECT_ID}/locations/${VERTEX_REGION}/publishers/anthropic/models/.*"

# Volumes to mount into the proxy container for credentials.
# Each entry has 'src' (host path, ~ expanded) and 'dst' (container path).
# All mounts are read-only.
proxy_volumes:
  - src: "~/.config/gcloud"
    dst: "/root/.config/gcloud"

# Additional egress rules (exact or Python regex).

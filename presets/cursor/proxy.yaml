# Default provider preset. Copied to .agentbox/sessions/<name>/config/proxy.yaml on 'agentbox run --name <name>'.

providers:
  - name: cursor
    enabled: true
    credential_type: static
    api_key_file: ~/.keys/cursor-token
    inject_header: Authorization
    inject_prefix: "Bearer "
    replace_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..Bgb2AAp6RYS/oJdGtYNgsuodUB5Wd69UqUPurQobzoM="
    request_policy:
      - host: "api2\\.cursor\\.sh"
        paths:
          - "/aiserver\\.v1\\..*"
          - "/agent\\.v1\\..*"
      - host: "agentn\\.us\\.api5\\.cursor\\.sh"
        paths:
          - "/aiserver\\.v1\\..*"
          - "/agent\\.v1\\..*"
      - host: "repo42\\.cursor\\.sh"
        paths:
          - "/v1/traces$"


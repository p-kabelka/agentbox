# Agent preset — copied to .agentbox/sessions/<name>/config/agent.yaml on 'agentbox init --name <name>'.

agent_image: localhost/agentbox-agent-cursor:latest

# OCI annotations applied to the agent container.
# Useful for setting krun resource limits (memory, CPUs).
# annotations:
#   krun.ram_mib: "2048"
#   krun.cpus: "2"

# Extra environment variables injected into the agent container.
# These are merged with (and can override) the base env in compose-base.yaml.
environment:
  AGENT_HARNESS: agent
  AGENT_HARNESS_ARGS:

# Dotfiles placed in the agent's $HOME at session start.
# Keys are paths relative to home (e.g. .bashrc, .gitconfig, .config/git/config).
dotfiles:
  .bashrc: |
    # .bashrc

    # Source global definitions
    if [ -f /etc/bashrc ]; then
        . /etc/bashrc
    fi

    # User specific environment
    if ! [[ "$PATH" =~ "$HOME/.local/bin:$HOME/bin:" ]]; then
        PATH="$HOME/.local/bin:$HOME/bin:$PATH"
    fi
    export PATH

    # Uncomment the following line if you don't like systemctl's auto-paging feature:
    # export SYSTEMD_PAGER=

    # User specific aliases and functions
    if [ -d ~/.bashrc.d ]; then
        for rc in ~/.bashrc.d/*; do
            if [ -f "$rc" ]; then
                . "$rc"
            fi
        done
    fi
    unset rc

    # CUSTOM
    export EDITOR=vim
    alias agent="$AGENT_HARNESS $AGENT_HARNESS_ARGS"
    alias ll="ls -lasp"
    alias g="git"

    # Cursor CLI settings: ~/.cursor/cli-config.json
    _cursor_cli_config="$HOME/.cursor/cli-config.json"
    if ! jq -e '.rewind == true and .approvalMode == "unrestricted"' "$_cursor_cli_config" &>/dev/null; then
      mkdir -p "$HOME/.cursor" 2>/dev/null || true
      if [ -f "$_cursor_cli_config" ]; then
        jq '. * {rewind: true, approvalMode: "unrestricted"}' "$_cursor_cli_config" > "${_cursor_cli_config}.tmp" && cp -f "${_cursor_cli_config}.tmp" "$_cursor_cli_config" && rm -f "${_cursor_cli_config}.tmp"
      else
        echo '{"rewind": true, "approvalMode": "unrestricted"}' > "$_cursor_cli_config"
      fi
    fi

    # Pre-trust the workspace: ~/.cursor/projects/<project_name>/.workspace-trusted
    _cursor_ws="$(pwd)"
    _cursor_project_name="$(basename "$(realpath "$_cursor_ws")")"
    _cursor_trust_dir="$HOME/.cursor/projects/$_cursor_project_name"
    _cursor_trust_file="$_cursor_trust_dir/.workspace-trusted"
    if ! jq -e --arg workspace "$_cursor_ws" '.workspacePath == $workspace' "$_cursor_trust_file" &>/dev/null; then
      mkdir -p "$_cursor_trust_dir" 2>/dev/null || true
      jq -n --arg workspace "$_cursor_ws" '{workspacePath: $workspace}' > "$_cursor_trust_file"
    fi

    _cursor_auth="$HOME/.config/cursor/auth.json"
    if [ -z "$CURSOR_REFRESH_TOKEN" ] && [ ! -f "$_cursor_auth" ]; then
      mkdir -p "$HOME/.config/cursor" 2>/dev/null || true
      echo '{"accessToken": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..Bgb2AAp6RYS/oJdGtYNgsuodUB5Wd69UqUPurQobzoM=","refreshToken": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..Bgb2AAp6RYS/oJdGtYNgsuodUB5Wd69UqUPurQobzoM="}' > "$_cursor_auth"
    fi
  .gitconfig: |
    [user]
        name = Agent
        email = agent@agentbox

# Default provider preset. Copied to .sandbox/sessions/<name>/config/proxy.yaml on 'sandbox run --name <name>'.

providers:

  - name: anthropic
    enabled: false
    api_key_env: ANTHROPIC_API_KEY
    inject_header: x-api-key
    inject_prefix: ""
    allowed_hosts:
      - api.anthropic.com

  - name: openai
    enabled: false
    api_key_env: OPENAI_API_KEY
    inject_header: Authorization
    inject_prefix: "Bearer "
    allowed_hosts:
      - api.openai.com

  # Requires credentials at ~/.agent-sandbox/secrets/credentials.json
  - name: vertex
    enabled: false
    metadata_server: true  # starts fake GCE metadata sidecar on proxy:9090
    allowed_hosts:
      - "*.googleapis.com"

  # Azure: uncomment and set api_key_env + allowed_hosts to add Azure OpenAI
  # - name: azure-openai
  #   enabled: false
  #   api_key_env: AZURE_OPENAI_API_KEY
  #   inject_header: api-key
  #   inject_prefix: ""
  #   allowed_hosts:
  #     - "*.openai.azure.com"

# Additional egress hosts (exact or *.wildcard). Restart proxy after changes.
extra_allowed_hosts: []

logging:
  level: info
  log_request_headers: true
  log_response_headers: false
  log_bodies: false  # WARNING: may log sensitive prompt content if enabled
  file: /var/log/proxy/access.log

# Default provider preset. Copied to .agentbox/sessions/<name>/config/proxy.yaml on 'agentbox run --name <name>'.

providers:

  - name: anthropic
    enabled: false
    credential_type: static
    # api_key_file: /secrets/anthropic_key  # read key from file (takes precedence over env)
    api_key_env: ANTHROPIC_API_KEY
    inject_header: x-api-key
    inject_prefix: ""
    request_policy:
      - host: "api\\.anthropic\\.com"
        paths:
          - "/v1/messages(/.*)?$"
          - "/v1/complete$"
          - "/v1/models(/.*)?$"
        methods: [POST, GET]

  - name: openai
    enabled: false
    credential_type: static
    api_key_env: OPENAI_API_KEY
    inject_header: Authorization
    inject_prefix: "Bearer "
    request_policy:
      - host: "api\\.openai\\.com"
        paths:
          - "/v1/chat/completions$"
          - "/v1/completions$"
          - "/v1/embeddings$"
          - "/v1/responses(/.*)?$"
        methods: [POST, GET]

  # Requires credentials at ~/.agentbox/secrets/credentials.json
  - name: vertex
    enabled: false
    credential_type: oauth
    metadata_server: true
    inject_header: Authorization
    inject_prefix: "Bearer "
    replace_token: "dummy-replaced-by-proxy"
    request_policy:
      - host: "(.*-)?aiplatform\\.googleapis\\.com"
        paths:
          - "/v1/projects/${VERTEX_PROJECT_ID}/locations/${VERTEX_REGION}/publishers/anthropic/models/.*"

  # Azure: uncomment and set api_key_env + request_policy to add Azure OpenAI
  # - name: azure-openai
  #   enabled: false
  #   credential_type: static
  #   api_key_env: AZURE_OPENAI_API_KEY
  #   inject_header: api-key
  #   inject_prefix: ""
  #   request_policy:
  #     - host: ".*\\.openai\\.azure\\.com"
  #       paths:
  #         - "/openai/deployments/.*"

# Custom trusted CA certificates (filenames from custom/certs/). Installed into
# the proxy's system trust store at startup so mitmproxy trusts upstream servers
# that use these CAs. The certs are installed in /usr/local/share/ca-certificates
# and they must have .crt extension for update-ca-certificates to find them.
# trusted_certificates:
#   - my-internal-ca.pem

# Volumes to mount into the proxy container for credentials.
# Each entry has 'src' (host path, ~ expanded) and 'dst' (container path).
# All mounts are read-only.
# proxy_volumes:
#   - src: "~/.config/gcloud"
#     dst: "/root/.config/gcloud"

# Additional egress rules (exact or Python regex).
extra_request_policy: []

# Extra environment variables for the proxy container. Merged with compose-base.yaml.
# environment:
#   VERTEX_PROJECT_ID: my-project
#   VERTEX_REGION: global

logging:
  log_request_headers: true
  log_response_headers: false
  log_bodies: false  # WARNING: may log sensitive prompt content if enabled

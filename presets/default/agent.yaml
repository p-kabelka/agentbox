# Agent preset — copied to .sandbox/sessions/<name>/config/agent.yaml on 'sandbox init --name <name>'.

# Extra environment variables injected into the agent container.
# These are merged with (and can override) the base env in compose-base.yaml.
environment: {}
  # AGENT_HARNESS: claude
  # AGENT_HARNESS_ARGS: --dangerously-skip-permissions
  # NODE_ENV: development

# Dotfiles placed in the agent's $HOME at session start.
# Keys are paths relative to home (e.g. .bashrc, .gitconfig, .config/git/config).
dotfiles: {}
  # .bashrc: |
  #   export PS1="\u@sandbox:\w\$ "
  #   alias ll='ls -la'
  # .gitconfig: |
  #   [user]
  #       name = Agent
  #       email = agent@sandbox

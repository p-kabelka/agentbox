# dynamic_chain: try direct connection first; fall back to proxy chain if unreachable.
#
# Result:
#   proxy:8080  (mitmproxy)       → direct succeeds (same agent-net) → no chain
#   proxy:9090  (metadata server) → direct succeeds (same agent-net) → no chain
#   api.anthropic.com et al.      → direct fails (no internet route) → tunnels through mitmproxy
dynamic_chain

[ProxyList]
http  proxy  8080

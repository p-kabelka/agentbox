# =============================================================================
# Agent Sandbox — Base Compose
# =============================================================================
# Shared by all projects. Do NOT edit per-project settings here.
# Project-specific overrides live in <project>/.sandbox/compose.override.yaml
#
# Required environment variables (set by the sandbox CLI):
#   SANDBOX_HOME  — path to ~/.agent-sandbox
#   SANDBOX_DIR   — path to <project>/.sandbox
#
# Required env from shell (user's environment):
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, etc. — whichever providers you enable
# =============================================================================

volumes:
  proxy-ca:      # mitmproxy CA cert: generated by proxy, trusted by agent
  proxy-logs:    # persistent structured access logs

networks:
  agent-net:
    internal: true   # no internet route; enforced by Podman — no host iptables needed
  proxy-net:         # internet-connected; only the proxy service is attached

services:

  proxy:
    image: localhost/agent-sandbox-proxy:latest
    networks:
      - agent-net
      - proxy-net
    volumes:
      - ${SANDBOX_DIR}/config/proxy.yaml:/config/proxy.yaml:ro,Z
      - ${SANDBOX_HOME}/secrets:/run/secrets:ro,Z
      - proxy-ca:/root/.mitmproxy:Z
      - proxy-logs:/var/log/proxy:Z
    environment:
      # Populate whichever keys your enabled providers need (from shell env)
      ANTHROPIC_API_KEY:              ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:                 ${OPENAI_API_KEY:-}
      AZURE_OPENAI_API_KEY:           ${AZURE_OPENAI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/credentials.json
      VERTEX_PROJECT_ID:              ${VERTEX_PROJECT_ID:-}
      VERTEX_REGION:                  ${VERTEX_REGION:-us-east5}
    # ports: defined in compose.override.yaml (unique port per project)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 25s

  agent:
    image: localhost/agent-sandbox-agent:latest
    networks:
      - agent-net          # internal only — no direct internet access
    depends_on:
      proxy:
        condition: service_healthy
    environment:
      AGENT_HARNESS:    ${AGENT_HARNESS:-claude}

      # Dummy credentials — mitmproxy on the proxy side injects the real values
      ANTHROPIC_API_KEY: dummy
      OPENAI_API_KEY:    dummy
      AZURE_OPENAI_API_KEY: dummy

      # Vertex: OAuth token issued by GCE metadata sidecar on proxy container
      GCE_METADATA_HOST:              proxy:9090
      ANTHROPIC_VERTEX_PROJECT_ID:    ${VERTEX_PROJECT_ID:-}
      CLOUD_ML_REGION:                ${VERTEX_REGION:-us-east5}

      # Standard proxy env vars — respected by curl, wget, Python requests, etc.
      HTTPS_PROXY: http://proxy:8080
      https_proxy: http://proxy:8080
      HTTP_PROXY:  http://proxy:8080
      http_proxy:  http://proxy:8080
      # Bypass proxy for services reachable directly on agent-net
      NO_PROXY:    proxy,localhost,127.0.0.1
      no_proxy:    proxy,localhost,127.0.0.1
    volumes:
      - proxy-ca:/proxy-ca:ro,Z
      # Project-specific mounts (source bundle, output repo, etc.)
      # added via compose.override.yaml
    working_dir: /workspace
    stdin_open: true
    tty: true

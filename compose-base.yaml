# Shared base compose — do not edit per-project settings here.
# Per-project overrides live in <project>/.sandbox/compose.override.yaml.

volumes:
  proxy-ca:    # mitmproxy CA cert shared between proxy and agent
  proxy-logs:  # persistent structured access logs

networks:
  agent-net:
    internal: true   # no internet route; enforced by Podman — no host iptables needed
  proxy-net:         # internet-connected; only the proxy service is attached

services:

  proxy:
    image: localhost/agent-sandbox-proxy:latest
    networks:
      - agent-net
      - proxy-net
    volumes:
      - ${SANDBOX_HOME}/secrets:/run/secrets:ro,Z
      - proxy-ca:/root/.mitmproxy:Z
      - proxy-logs:/var/log/proxy:Z
    environment:
      ANTHROPIC_API_KEY:              ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:                 ${OPENAI_API_KEY:-}
      AZURE_OPENAI_API_KEY:           ${AZURE_OPENAI_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/credentials.json
      VERTEX_PROJECT_ID:              ${VERTEX_PROJECT_ID:-}
      VERTEX_REGION:                  ${VERTEX_REGION:-us-east5}
    # ports: defined per-project in compose.override.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-so", "/dev/null", "http://localhost:8081/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 25s

  agent:
    image: localhost/agent-sandbox-agent:latest
    networks:
      - agent-net          # internal only — no direct internet access
    depends_on:
      proxy:
        condition: service_healthy
    environment:
      AGENT_HARNESS:  ${AGENT_HARNESS:-claude}
      SANDBOX_NAME:   ${SANDBOX_NAME:-}

      # Dummy credentials — proxy injects real values via mitmproxy
      ANTHROPIC_API_KEY:    dummy
      OPENAI_API_KEY:       dummy
      AZURE_OPENAI_API_KEY: dummy

      # Vertex: OAuth tokens served by fake GCE metadata server on proxy
      GCE_METADATA_HOST:           proxy:9090
      ANTHROPIC_VERTEX_PROJECT_ID: ${VERTEX_PROJECT_ID:-}
      CLOUD_ML_REGION:             ${VERTEX_REGION:-us-east5}

      HTTPS_PROXY: http://proxy:8080
      https_proxy: http://proxy:8080
      HTTP_PROXY:  http://proxy:8080
      http_proxy:  http://proxy:8080
      NO_PROXY:    proxy,localhost,127.0.0.1
      no_proxy:    proxy,localhost,127.0.0.1
    volumes:
      - proxy-ca:/proxy-ca:ro,Z
    stdin_open: true
    tty: true
